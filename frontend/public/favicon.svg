<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Bar chart bars -->
  <rect x="5" y="18" width="5" height="9" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="13.5" y="12" width="5" height="15" rx="1.5" fill="white"/>
  <rect x="22" y="7" width="5" height="20" rx="1.5" fill="white" opacity="0.9"/>
  <!-- Trend line -->
  <polyline points="7.5,17 16,11 24.5,6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Dot on trend -->
  <circle cx="24.5" cy="6" r="1.8" fill="white" opacity="0.9"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
</svg>
